---
# Example playbook: Detach VNI from ROKS Cluster
# This demonstrates detaching a VNI from a ROKS cluster

- name: Detach VNI from ROKS Cluster
  hosts: localhost
  gather_facts: false
  collections:
    - ibm.cloudcollection
  
  vars:
    # IBM Cloud Configuration
    ibm_region: us-south
    
    # IBM Cloud API Key - can be set as variable or environment variable
    # Option 1: Set as environment variable: export IC_API_KEY="your-api-key"
    # Option 2: Uncomment and set directly (not recommended for production)
    # ibmcloud_api_key: "your-api-key-here"
    ibmcloud_api_key: "{{ lookup('env', 'IC_API_KEY') }}"
    
    # ROKS Cluster Name - can be set as variable or environment variable
    # Option 1: Set as environment variable: export CLUSTER_NAME="your-cluster-name"
    # Option 2: Uncomment and set directly
    # cluster_name: "your-cluster-name-here"
    cluster_name: "{{ lookup('env', 'CLUSTER_NAME') }}"
    
    # Resource naming
    vni_name: vni-roks-cluster

  tasks:
    - name: Validate required variables
      fail:
        msg: |
          Required variables not set!
          
          Missing: {{ missing_vars | join(', ') }}
          
          Please set environment variables:
            export IC_API_KEY="your-api-key"
            export CLUSTER_NAME="your-cluster-name"
          
          Or set them in the playbook vars section.
      vars:
        missing_vars: "{{ [] + (['IC_API_KEY'] if not ibmcloud_api_key else []) + (['CLUSTER_NAME'] if not cluster_name else []) }}"
      when: missing_vars | length > 0

    - name: Get VNI information by name
      ibm_is_virtual_network_interface_info:
        name: "{{ vni_name }}"
        region: "{{ ibm_region }}"
      register: vni_lookup

    - name: Fail if VNI not found
      fail:
        msg: "VNI '{{ vni_name }}' not found."
      when: not vni_lookup.found

    - name: Detach VNI from ROKS cluster
      ibm_ks_cluster_vni:
        cluster: "{{ cluster_name }}"
        vni_id: "{{ vni_lookup.resource.id }}"
        ibmcloud_api_key: "{{ ibmcloud_api_key }}"
        region: "{{ ibm_region }}"
        state: absent
      register: detach_result

    - name: Display detachment result
      debug:
        msg: |
          VNI Detachment Result:
          - Cluster: {{ detach_result.cluster }}
          - VNI ID: {{ detach_result.vni_id }}
          - Status: {{ detach_result.msg }}
          - Changed: {{ detach_result.changed }}

    - name: Summary
      debug:
        msg: |
          ========================================
          VNI Detached from ROKS Cluster Successfully!
          ========================================
          
          Cluster: {{ cluster_name }}
          VNI Name: {{ vni_name }}
          VNI ID: {{ vni_lookup.resource.id }}
          Region: {{ ibm_region }}
          
          Detachment Status:
            - {{ detach_result.msg }}
          
          Next Steps:
            1. Verify VNI detachment: ibmcloud ks cluster get --cluster {{ cluster_name }}
            2. Optionally delete the VNI if no longer needed
            3. Check cluster worker nodes: ibmcloud ks workers --cluster {{ cluster_name }}
          
          ========================================
