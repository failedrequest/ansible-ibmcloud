---
namespace: ibm
name: cloudcollection
version: 1.0.3
readme: README.md
authors:
  - Mark Saad 

description: >-
  IBM Cloud Ansible Collection - Pure Python implementation for managing
  IBM Cloud VPC, Transit Gateway, and Platform services. No Terraform
  dependencies required.

license:
  - BSD 2-Clause \"Simplified\" License

tags:
  - ibm
  - cloud
  - vpc
  - infrastructure
  - networking
  - platform
  - transit_gateway
  - iaas

dependencies: {}

repository: https://github.com/failedrequest/ansible-ibmcloud
documentation: https://github.com/failedrequest/ansible-ibmcloud/tree/main/docs
homepage: https://github.com/failedrequest/ansible-ibmcloud
issues: https://github.com/failedrequest/ansible-ibmcloud/issues

build_ignore:
  - .git
  - .gitignore
  - .venv
  - build
  - temp_reference
  - tools
  - tests
  - '*.pyc'
  - '*.pyo'
  - __pycache__
  - .DS_Store
  - '*.swp'
  - '*.bak'
